spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true

# Enable the web interface

# This allows the console to load inside the frame in the browser
spring.h2.console.settings.web-allow-others=true

# Optional: Fixed name so you don't have to hunt for a random UUID
# in the logs (use jdbc:h2:mem:testdb in the login screen)
spring.datasource.generate-unique-name=false
spring.datasource.name=testdb
jwt.secret=lkadsfklafdskljadfklaslkfaslkdflaksjdlfkadsljfklasjdflkasjlkfasdlkfjaslkfdsalkj
jwt.header=Authorization
test.working=yes